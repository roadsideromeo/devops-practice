---
- name: Suraj's Full DevOps Setup
  hosts: local
  become: yes

  vars:
    dev_user: suraj
    devops_dir: /opt/devops

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - nginx
          - ufw
          - curl
          - git
        state: present

    - name: Start and enable nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Allow SSH through UFW
      ufw:
        rule: allow
        port: '2222'
        proto: tcp

    - name: Allow HTTP through UFW
      ufw:
        rule: allow
        port: '80'
        proto: tcp

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Create devops directory
      file:
        path: "{{ devops_dir }}"
        state: directory
        mode: '0755'

    - name: Create health check script
      copy:
        content: |
          #!/bin/bash
          echo "=== Health Check ===" >> /var/log/health.log
          echo "Date: $(date)" >> /var/log/health.log
          echo "Disk: $(df -h / | tail -1)" >> /var/log/health.log
          echo "Memory: $(free -h | grep Mem)" >> /var/log/health.log
        dest: "{{ devops_dir }}/health-check.sh"
        mode: '0755'

    - name: Add cron job for health check
      cron:
        name: "DevOps Health Check"
        minute: "0"
        hour: "9"
        job: "{{ devops_dir }}/health-check.sh"
        user: "{{ dev_user }}"
