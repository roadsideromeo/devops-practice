services:
  webapp:
    image: suraj-devops-app
    ports:
      - "8088:80"
    restart: always

  prometheus:
    image: prom/prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    restart: always
