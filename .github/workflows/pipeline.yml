name: My First Pipeline

on:
  push:
    branches:
      - main
      - day8-cicd
      - day9-topic

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Say Hello
        run: echo "Hello from GitHub Actions!"

      - name: Show date
        run: date

      - name: List files
        run: ls -la

      - name: Check disk space
        run: df -h

      - name: Check memory
        run: free -h

      - name: System info
        run: uname -a


- name: Build Docker image
        run: docker build -t suraj-devops-app ./day12

      - name: Verify image built
        run: docker images | grep suraj-devops-app

      - name: Test container runs
        run: |
          docker run -d -p 8099:80 --name test-app suraj-devops-app
          sleep 3
          curl http://localhost:8099
          docker stop test-app
          docker rm test-app
